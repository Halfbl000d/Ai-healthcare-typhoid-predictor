version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: healthcare_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=ai_healthcare
    networks:
      - healthcare-network
    restart: unless-stopped

  # Backend Flask API
  backend:
    build: 
      context: ./back_end
      dockerfile: Dockerfile
    container_name: healthcare_backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/ai_healthcare
      - SECRET_KEY=your_super_secret_key_change_this_in_production_12345
      - FUZZY_THRESHOLD=80
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./back_end/uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - healthcare-network
    restart: unless-stopped

  # Frontend React App  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthcare_frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - healthcare-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  healthcare-network:
    driver: bridge